<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RETRO BREAK 3D</title>
    <style>
      :root {
        --ink: #f8f6de;
        --amber: #ffb000;
        --cyan: #32f7ff;
        --mint: #50ff8d;
        --red: #ff3d4e;
        --violet: #9b5cff;
        --cabinet: #11110e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 176, 0, 0.11), transparent 28rem),
          linear-gradient(120deg, #090a0a 0%, #17110f 42%, #070909 100%);
        color: var(--ink);
        font-family: "Courier New", "Lucida Console", monospace;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.05) 0,
            rgba(255, 255, 255, 0.05) 1px,
            transparent 1px,
            transparent 4px
          );
        mix-blend-mode: screen;
        opacity: 0.34;
        z-index: 4;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 0, 0, 0.04), transparent 18%, rgba(0, 255, 255, 0.04)),
          radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.46) 100%);
        z-index: 5;
      }

      #game {
        position: fixed;
        inset: 0;
      }

      #hud {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 18px clamp(14px, 4vw, 46px) 22px;
        pointer-events: none;
        z-index: 7;
      }

      .topbar,
      .bottombar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        text-shadow: 0 0 10px rgba(255, 176, 0, 0.75);
      }

      .brand {
        min-width: 0;
      }

      .brand strong {
        display: block;
        color: var(--amber);
        font-size: 22px;
        line-height: 1;
      }

      .brand span,
      .stat small,
      .bottombar {
        color: rgba(248, 246, 222, 0.7);
        font-size: 12px;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        flex: 1 1 300px;
        justify-content: center;
      }

      .control {
        display: grid;
        gap: 6px;
        min-width: min(320px, 42vw);
      }

      .control span {
        font-size: 12px;
        color: rgba(248, 246, 222, 0.78);
      }

      .control input[type="range"] {
        width: 100%;
        accent-color: var(--amber);
      }

      .pause-btn {
        min-height: 38px;
        border: 1px solid rgba(50, 247, 255, 0.65);
        background: rgba(9, 12, 12, 0.8);
        color: var(--ink);
        padding: 0 14px;
        font: 700 13px "Courier New", monospace;
        cursor: pointer;
        text-transform: none;
        box-shadow: 0 0 16px rgba(50, 247, 255, 0.18);
      }

      .stat {
        min-width: 76px;
        border: 1px solid rgba(255, 176, 0, 0.4);
        background: rgba(5, 6, 5, 0.56);
        padding: 8px 10px;
        box-shadow: inset 0 0 22px rgba(255, 176, 0, 0.08);
      }

      .stat b {
        display: block;
        color: var(--ink);
        font-size: 18px;
        line-height: 1.05;
      }

      #message {
        align-self: center;
        justify-self: center;
        max-width: min(680px, calc(100vw - 30px));
        padding: 24px 28px;
        border: 1px solid rgba(50, 247, 255, 0.55);
        background: rgba(5, 8, 8, 0.7);
        box-shadow:
          0 0 34px rgba(50, 247, 255, 0.16),
          inset 0 0 28px rgba(255, 176, 0, 0.08);
        text-align: center;
        pointer-events: auto;
      }

      #message.hidden {
        display: none;
      }

      #message h1 {
        margin: 0 0 12px;
        color: var(--cyan);
        font-size: clamp(30px, 7vw, 76px);
        line-height: 0.94;
        font-weight: 700;
        text-shadow:
          3px 0 0 rgba(255, 61, 78, 0.45),
          -3px 0 0 rgba(50, 247, 255, 0.45),
          0 0 18px rgba(50, 247, 255, 0.55);
      }

      #message p {
        margin: 0 auto 18px;
        max-width: 48ch;
        color: rgba(248, 246, 222, 0.82);
        font-size: 14px;
        line-height: 1.6;
      }

      #start {
        min-height: 46px;
        border: 1px solid var(--amber);
        border-radius: 0;
        background: var(--amber);
        color: #161005;
        padding: 0 20px;
        font: 700 14px "Courier New", monospace;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(255, 176, 0, 0.46);
      }

      #start:active {
        transform: translateY(1px);
      }

      .power-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 12px;
      }

      .power-list span {
        border: 1px solid rgba(248, 246, 222, 0.26);
        padding: 5px 8px;
        color: rgba(248, 246, 222, 0.78);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
      }

      #pauseOverlay {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        z-index: 8;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(2px);
      }

      #pauseOverlay.show {
        display: grid;
      }

      #pauseOverlay .panel {
        pointer-events: auto;
        text-align: center;
        padding: 22px 26px;
        border: 1px solid rgba(50, 247, 255, 0.55);
        background: rgba(5, 8, 8, 0.82);
        box-shadow: 0 0 28px rgba(50, 247, 255, 0.18);
        max-width: min(420px, calc(100vw - 24px));
      }

      #pauseOverlay h2 {
        margin: 0 0 8px;
        color: var(--cyan);
        font-size: 26px;
      }

      #pauseOverlay p {
        margin: 0;
        color: rgba(248, 246, 222, 0.82);
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 720px) {
        #hud {
          padding: 12px 10px 14px;
        }

        .topbar {
          align-items: flex-start;
          flex-wrap: wrap;
        }

        .brand strong {
          font-size: 18px;
        }

        .controls {
          order: 3;
          width: 100%;
          justify-content: stretch;
        }

        .control {
          min-width: 0;
          width: 100%;
        }

        .stat {
          min-width: 62px;
          padding: 6px 7px;
        }

        .stat b {
          font-size: 15px;
        }

        .bottombar {
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main id="game" aria-label="3D 打砖块游戏"></main>
    <section id="hud" aria-live="polite">
      <div class="topbar">
        <div class="brand">
          <strong>复古打砖 3D</strong>
          <span>街机核心 / 上世纪电子风格</span>
        </div>
        <div class="controls">
          <label class="control" for="viewRange">
            <span>视角调节</span>
            <input id="viewRange" type="range" min="0" max="100" value="40" />
          </label>
          <button id="pauseButton" class="pause-btn" type="button">暂停</button>
        </div>
        <div class="stats">
          <div class="stat"><small>得分</small><b id="score">000000</b></div>
          <div class="stat"><small>球数</small><b id="balls">3</b></div>
          <div class="stat"><small>关卡</small><b id="level">1</b></div>
        </div>
      </div>

      <div id="message">
        <h1>复古打砖</h1>
        <p>
          用挡板把金属弹球送回砖墙。彩色砖会放出多球、穿透球、磁力挡板和加宽挡板；硬砖需要多次命中。按空格发射，按 P 暂停。
        </p>
        <button id="start" type="button">投币开始</button>
        <div class="power-list" aria-label="特殊砖块说明">
          <span>多球砖</span>
          <span>穿透砖</span>
          <span>加宽砖</span>
          <span>磁力砖</span>
          <span>硬砖</span>
        </div>
      </div>

      <div class="bottombar">
        <span>移动：鼠标 / 触控 / 方向键</span>
        <span>操作：空格发射，P 暂停</span>
      </div>
    </section>
    <section id="pauseOverlay" class="hidden" aria-hidden="true">
      <div class="panel">
        <h2>已暂停</h2>
        <p>再次按 P 或空格继续。你也可以调整视角后再接着打。</p>
      </div>
    </section>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";

      const root = document.querySelector("#game");
      const scoreEl = document.querySelector("#score");
      const ballsEl = document.querySelector("#balls");
      const levelEl = document.querySelector("#level");
      const message = document.querySelector("#message");
      const startButton = document.querySelector("#start");
      const pauseButton = document.querySelector("#pauseButton");
      const pauseOverlay = document.querySelector("#pauseOverlay");
      const viewRange = document.querySelector("#viewRange");

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x090909, 18, 48);

      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 11.5, 16.5);
      camera.lookAt(0, 0, -2.5);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      root.appendChild(renderer.domElement);

      const game = {
        width: 15.5,
        depth: 21,
        paddleZ: 7.1,
        topZ: -10.4,
        running: false,
        paused: false,
        score: 0,
        lives: 3,
        level: 1,
        targetX: 0,
        keys: new Set(),
        lastTime: 0,
        shake: 0,
        flash: 0,
        magnetUntil: 0,
        wideUntil: 0,
        pierceUntil: 0,
        viewMode: Number(viewRange.value) / 100
      };

      message.classList.remove("hidden");
      pauseOverlay.classList.remove("show");

      const palette = {
        normal: 0xffb000,
        hard: 0x32f7ff,
        multi: 0xff3d4e,
        pierce: 0x50ff8d,
        wide: 0xffffff,
        magnet: 0x9b5cff
      };

      const brickTypes = [
        { type: "normal", hits: 1, score: 10, color: palette.normal }, // 普通砖：一击消失，负责铺底和推进节奏。
        { type: "hard", hits: 2, score: 25, color: palette.hard }, // 硬砖：需要两次命中，适合做“墙感”和路线阻隔。
        { type: "multi", hits: 1, score: 40, color: palette.multi, power: "multi" }, // 多球砖：掉落后生成额外弹球，适合制造混战。
        { type: "pierce", hits: 1, score: 35, color: palette.pierce, power: "pierce" }, // 穿透砖：触发穿透球，球可连续穿过多块砖。
        { type: "wide", hits: 1, score: 30, color: palette.wide, power: "wide" }, // 加宽砖：触发加宽挡板，容错更高。
        { type: "magnet", hits: 1, score: 35, color: palette.magnet, power: "magnet" } // 磁力砖：触发磁力挡板，球会粘板一次便于控球。
      ];

      const levelTemplates = [
        {
          name: "经典战线",
          rows: 6,
          cols: 9,
          gapX: 0.22,
          gapZ: 0.18,
          brickW: 1.28,
          brickD: 0.56,
          startZ: -8.75,
          build(r, c, rows, cols) {
            return { present: r < rows - 1 || c % 2 === 0, specialBias: r <= 1 ? 0 : 1 };
          }
        },
        {
          name: "双塔夹道",
          rows: 7,
          cols: 10,
          gapX: 0.2,
          gapZ: 0.18,
          brickW: 1.18,
          brickD: 0.54,
          startZ: -8.9,
          build(r, c, rows, cols) {
            const center = Math.floor(cols / 2);
            const tower = c < 2 || c > cols - 3;
            const bridge = r === 2 || r === 4;
            return { present: tower || bridge || c === center, specialBias: tower ? 2 : 0 };
          }
        },
        {
          name: "阶梯迷阵",
          rows: 6,
          cols: 9,
          gapX: 0.22,
          gapZ: 0.2,
          brickW: 1.26,
          brickD: 0.56,
          startZ: -8.65,
          build(r, c, rows, cols) {
            return { present: c >= r - 1 && c <= cols - 1 - Math.max(0, r - 2), specialBias: r === 0 ? 3 : 1 };
          }
        },
        {
          name: "空心堡垒",
          rows: 7,
          cols: 9,
          gapX: 0.22,
          gapZ: 0.18,
          brickW: 1.24,
          brickD: 0.54,
          startZ: -8.85,
          build(r, c, rows, cols) {
            const border = r === 0 || r === rows - 1 || c === 0 || c === cols - 1;
            const pillars = (c === 2 || c === cols - 3) && r >= 2 && r <= rows - 3;
            return { present: border || pillars, specialBias: border ? 2 : 0 };
          }
        },
        {
          name: "霓虹棋盘",
          rows: 6,
          cols: 10,
          gapX: 0.18,
          gapZ: 0.18,
          brickW: 1.14,
          brickD: 0.54,
          startZ: -8.7,
          build(r, c) {
            return { present: (r + c) % 2 === 0 || r === 1 || r === 4, specialBias: c % 3 === 0 ? 1 : 0 };
          }
        },
        {
          name: "中央回廊",
          rows: 7,
          cols: 9,
          gapX: 0.2,
          gapZ: 0.18,
          brickW: 1.22,
          brickD: 0.54,
          startZ: -8.8,
          build(r, c, rows, cols) {
            const mid = Math.floor(cols / 2);
            const corridor = c === mid && r >= 1 && r <= rows - 2;
            const slant = Math.abs(c - mid) === r - 2;
            return { present: !corridor && (slant || r === 0 || r === rows - 1 || c === 0 || c === cols - 1), specialBias: corridor ? 0 : 1 };
          }
        }
      ];

      const audio = {
        context: null,
        enabled: false,
        start() {
          if (!this.context) {
            this.context = new (window.AudioContext || window.webkitAudioContext)();
          }
          this.context.resume();
          this.enabled = true;
        },
        beep(freq, length = 0.05, type = "square", volume = 0.08, slide = 1) {
          if (!this.enabled || !this.context) return;
          const now = this.context.currentTime;
          const osc = this.context.createOscillator();
          const gain = this.context.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, now);
          osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq * slide), now + length);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(volume, now + 0.008);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + length);
          osc.connect(gain);
          gain.connect(this.context.destination);
          osc.start(now);
          osc.stop(now + length + 0.02);
        },
        chord(notes) {
          notes.forEach((note, index) => setTimeout(() => this.beep(note, 0.075, "square", 0.075, 0.62), index * 34));
        },
        noise(length = 0.12, volume = 0.08) {
          if (!this.enabled || !this.context) return;
          const buffer = this.context.createBuffer(1, this.context.sampleRate * length, this.context.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < data.length; i += 1) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
          const source = this.context.createBufferSource();
          const gain = this.context.createGain();
          source.buffer = buffer;
          gain.gain.value = volume;
          source.connect(gain);
          gain.connect(this.context.destination);
          source.start();
        }
      };

      const floorMat = new THREE.MeshStandardMaterial({
        color: 0x10120f,
        roughness: 0.38,
        metalness: 0.24,
        emissive: 0x151008,
        emissiveIntensity: 0.35
      });
      const railMat = new THREE.MeshStandardMaterial({
        color: 0x1b1a13,
        roughness: 0.28,
        metalness: 0.6,
        emissive: 0x2f2100,
        emissiveIntensity: 0.18
      });
      const ballMat = new THREE.MeshStandardMaterial({
        color: 0xf8f6de,
        roughness: 0.18,
        metalness: 0.82,
        emissive: 0x342100,
        emissiveIntensity: 0.35
      });
      const paddleMat = new THREE.MeshStandardMaterial({
        color: 0x050607,
        roughness: 0.2,
        metalness: 0.78,
        emissive: 0xffb000,
        emissiveIntensity: 0.18
      });

      const floor = new THREE.Mesh(new THREE.BoxGeometry(game.width + 1.2, 0.36, game.depth + 1.1), floorMat);
      floor.position.y = -0.35;
      floor.receiveShadow = true;
      scene.add(floor);

      const grid = new THREE.GridHelper(26, 32, 0xffb000, 0x3b3321);
      grid.position.y = -0.15;
      grid.material.opacity = 0.38;
      grid.material.transparent = true;
      scene.add(grid);

      const rails = new THREE.Group();
      const railGeometry = new THREE.BoxGeometry(0.42, 0.7, game.depth + 1.4);
      const leftRail = new THREE.Mesh(railGeometry, railMat);
      leftRail.position.set(-game.width / 2 - 0.45, 0.15, 0);
      const rightRail = leftRail.clone();
      rightRail.position.x *= -1;
      const topRail = new THREE.Mesh(new THREE.BoxGeometry(game.width + 1.3, 0.7, 0.42), railMat);
      topRail.position.set(0, 0.15, game.topZ - 0.55);
      rails.add(leftRail, rightRail, topRail);
      rails.children.forEach((rail) => {
        rail.castShadow = true;
        rail.receiveShadow = true;
      });
      scene.add(rails);

      const paddle = new THREE.Mesh(new THREE.BoxGeometry(2.7, 0.5, 0.55), paddleMat);
      paddle.position.set(0, 0.35, game.paddleZ);
      paddle.castShadow = true;
      scene.add(paddle);

      const paddleGlow = new THREE.Mesh(
        new THREE.BoxGeometry(2.9, 0.54, 0.61),
        new THREE.MeshBasicMaterial({ color: 0xffb000, transparent: true, opacity: 0.16 })
      );
      paddle.add(paddleGlow);

      const ballGeometry = new THREE.SphereGeometry(0.26, 24, 16);
      const balls = [];
      const bricks = [];
      const pickups = [];
      const bursts = [];

      const mainLight = new THREE.DirectionalLight(0xfff0c0, 1.25);
      mainLight.position.set(3, 10, 7);
      mainLight.castShadow = true;
      scene.add(mainLight);
      scene.add(new THREE.HemisphereLight(0x32f7ff, 0x241000, 1.4));

      const amberLight = new THREE.PointLight(0xffb000, 2.2, 18);
      amberLight.position.set(0, 4, 5);
      scene.add(amberLight);

      const cyanLight = new THREE.PointLight(0x32f7ff, 1.5, 14);
      cyanLight.position.set(0, 3.5, -7);
      scene.add(cyanLight);

      function makeBrickMaterial(color) {
        return new THREE.MeshStandardMaterial({
          color,
          roughness: 0.24,
          metalness: 0.52,
          emissive: color,
          emissiveIntensity: 0.16
        });
      }

      function resetBall(ball = null, launched = false) {
        const target = ball || createBall();
        target.mesh.position.set(paddle.position.x, 0.35, game.paddleZ - 0.66);
        target.velocity.set(0, 0, launched ? -6.8 : 0);
        target.stuck = !launched;
        target.trail = [];
        if (!balls.includes(target)) balls.push(target);
        return target;
      }

      function createBall() {
        const mesh = new THREE.Mesh(ballGeometry, ballMat.clone());
        mesh.castShadow = true;
        scene.add(mesh);
        return {
          mesh,
          velocity: new THREE.Vector3(0, 0, 0),
          stuck: true,
          radius: 0.26,
          pierce: false,
          trail: []
        };
      }

      function getTemplate(level) {
        return levelTemplates[(level - 1) % levelTemplates.length];
      }

      function layoutBricks(level = game.level) {
        bricks.splice(0).forEach((brick) => scene.remove(brick.mesh));
        const template = getTemplate(level);
        const cols = template.cols;
        const rows = template.rows;
        const gapX = template.gapX;
        const gapZ = template.gapZ;
        const brickW = template.brickW;
        const brickD = template.brickD;
        const totalWidth = cols * brickW + (cols - 1) * gapX;
        const startX = -totalWidth / 2 + brickW / 2;
        const startZ = template.startZ;

        for (let r = 0; r < rows; r += 1) {
          for (let c = 0; c < cols; c += 1) {
            const cell = template.build(r, c, rows, cols);
            if (!cell.present) continue;
            const seed = (r * 11 + c * 7 + level * 5) % 23;
            let def = brickTypes[0];
            if (seed === 0 || seed === 9 || seed === 18) def = brickTypes[1];
            if (seed === 3) def = brickTypes[2];
            if (seed === 5) def = brickTypes[3];
            if (seed === 8) def = brickTypes[4];
            if (seed === 13) def = brickTypes[5];
            if (r < 2 && def.type === "normal") def = { ...brickTypes[0], score: 20, color: 0xff6f00 };
            if (cell.specialBias === 2 && def.type === "normal") def = brickTypes[1];
            if (cell.specialBias === 3 && def.type === "normal") def = brickTypes[2];

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(brickW, 0.5, brickD), makeBrickMaterial(def.color));
            mesh.position.set(startX + c * (brickW + gapX), 0.45, startZ + r * (brickD + gapZ));
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            bricks.push({ ...def, maxHits: def.hits, mesh, w: brickW, d: brickD, alive: true });
          }
        }
      }

      function spawnPickup(position, power) {
        const color = palette[power] || palette.normal;
        const mesh = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.34, 0),
          new THREE.MeshStandardMaterial({
            color,
            metalness: 0.55,
            roughness: 0.18,
            emissive: color,
            emissiveIntensity: 0.46
          })
        );
        mesh.position.copy(position);
        mesh.position.y = 0.72;
        mesh.userData.power = power;
        mesh.castShadow = true;
        scene.add(mesh);
        pickups.push({ mesh, power, speed: 2.25 });
      }

      function burst(position, color, count = 12) {
        for (let i = 0; i < count; i += 1) {
          const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.08, 0.08),
            new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
          );
          mesh.position.copy(position);
          scene.add(mesh);
          bursts.push({
            mesh,
            life: 0.5 + Math.random() * 0.22,
            velocity: new THREE.Vector3((Math.random() - 0.5) * 5.2, Math.random() * 2.2 + 0.8, (Math.random() - 0.5) * 5.2)
          });
        }
      }

      function launchBalls() {
        balls.forEach((ball, index) => {
          if (!ball.stuck) return;
          ball.stuck = false;
          const side = index % 2 === 0 ? 1 : -1;
          ball.velocity.set(side * (1.2 + Math.random() * 0.7), 0, -7.2 - game.level * 0.2);
        });
        audio.chord([220, 330, 660]);
      }

      function applyPower(power) {
        const now = performance.now();
        if (power === "multi") {
          const active = balls.filter((ball) => !ball.stuck);
          const source = active[0] || balls[0];
          for (let i = 0; i < 2; i += 1) {
            const ball = resetBall(createBall(), true);
            ball.mesh.position.copy(source.mesh.position);
            ball.velocity.set((i ? 1 : -1) * 3.3, 0, -Math.abs(source.velocity.z || 6.5));
          }
          audio.chord([440, 660, 880]);
        }
        if (power === "pierce") {
          game.pierceUntil = now + 9000;
          balls.forEach((ball) => {
            ball.pierce = true;
            ball.mesh.material.emissive.setHex(0x50ff8d);
            ball.mesh.material.emissiveIntensity = 0.9;
          });
          audio.chord([330, 659, 988]);
        }
        if (power === "wide") {
          game.wideUntil = now + 10000;
          audio.beep(180, 0.2, "sawtooth", 0.08, 2.2);
        }
        if (power === "magnet") {
          game.magnetUntil = now + 9000;
          audio.chord([247, 494, 740]);
        }
      }

      function clampPaddle() {
        const half = game.width / 2 - currentPaddleWidth() / 2;
        paddle.position.x = THREE.MathUtils.clamp(paddle.position.x, -half, half);
      }

      function currentPaddleWidth() {
        return game.wideUntil > performance.now() ? 4.4 : 2.7;
      }

      function updatePaddle(dt) {
        const speed = 11.5;
        if (game.keys.has("ArrowLeft") || game.keys.has("KeyA")) game.targetX -= speed * dt;
        if (game.keys.has("ArrowRight") || game.keys.has("KeyD")) game.targetX += speed * dt;
        const half = game.width / 2 - currentPaddleWidth() / 2;
        game.targetX = THREE.MathUtils.clamp(game.targetX, -half, half);
        paddle.position.x += (game.targetX - paddle.position.x) * Math.min(1, 12 * dt);
        const width = currentPaddleWidth();
        paddle.scale.x += (width / 2.7 - paddle.scale.x) * Math.min(1, 10 * dt);
        paddleGlow.material.opacity = game.magnetUntil > performance.now() ? 0.32 : 0.16;
        clampPaddle();
      }

      function updateCamera(shakeX = 0, shakeY = 0) {
        const t = game.viewMode;
        camera.fov = THREE.MathUtils.lerp(42, 62, t);
        camera.position.set(
          shakeX,
          THREE.MathUtils.lerp(9.1, 15.2, t) + shakeY,
          THREE.MathUtils.lerp(19.6, 12.5, t)
        );
        camera.lookAt(0, 0, -3);
        camera.updateProjectionMatrix();
      }

      function moveBall(ball, dt) {
        if (ball.stuck) {
          ball.mesh.position.x = paddle.position.x;
          ball.mesh.position.z = game.paddleZ - 0.66;
          return;
        }

        ball.mesh.position.addScaledVector(ball.velocity, dt);
        ball.mesh.rotation.x += ball.velocity.z * dt * 2;
        ball.mesh.rotation.z -= ball.velocity.x * dt * 2;

        const half = game.width / 2 - ball.radius;
        if (ball.mesh.position.x < -half || ball.mesh.position.x > half) {
          ball.mesh.position.x = THREE.MathUtils.clamp(ball.mesh.position.x, -half, half);
          ball.velocity.x *= -1;
          game.shake = Math.max(game.shake, 0.08);
          audio.beep(140, 0.035, "square", 0.045, 1.9);
        }
        if (ball.mesh.position.z < game.topZ + ball.radius) {
          ball.mesh.position.z = game.topZ + ball.radius;
          ball.velocity.z *= -1;
          game.shake = Math.max(game.shake, 0.08);
          audio.beep(160, 0.04, "square", 0.05, 1.8);
        }

        const paddleW = currentPaddleWidth();
        const px = paddle.position.x;
        const pz = paddle.position.z;
        const insideX = Math.abs(ball.mesh.position.x - px) < paddleW / 2 + ball.radius;
        const insideZ = Math.abs(ball.mesh.position.z - pz) < 0.44 + ball.radius;
        if (ball.velocity.z > 0 && insideX && insideZ) {
          const offset = (ball.mesh.position.x - px) / (paddleW / 2);
          ball.mesh.position.z = pz - 0.48 - ball.radius;
          ball.velocity.x = offset * 5.2;
          ball.velocity.z = -Math.max(6.5, Math.abs(ball.velocity.z) * 1.018);
          burst(ball.mesh.position, 0xffb000, 8);
          audio.beep(262 + Math.abs(offset) * 220, 0.055, "square", 0.08, 1.35);
          if (game.magnetUntil > performance.now()) {
            ball.stuck = true;
            ball.velocity.set(0, 0, 0);
          }
        }

        for (const brick of bricks) {
          if (!brick.alive) continue;
          const dx = ball.mesh.position.x - brick.mesh.position.x;
          const dz = ball.mesh.position.z - brick.mesh.position.z;
          if (Math.abs(dx) < brick.w / 2 + ball.radius && Math.abs(dz) < brick.d / 2 + ball.radius) {
            hitBrick(brick, ball, dx, dz);
            if (!ball.pierce) {
              if (Math.abs(dx) / brick.w > Math.abs(dz) / brick.d) ball.velocity.x *= -1;
              else ball.velocity.z *= -1;
            }
            break;
          }
        }
      }

      function hitBrick(brick, ball, dx, dz) {
        brick.hits -= 1;
        game.score += brick.score;
        game.shake = Math.max(game.shake, brick.type === "hard" ? 0.17 : 0.12);
        game.flash = 0.22;
        brick.mesh.scale.set(1.08, 0.8, 1.08);
        burst(ball.mesh.position, brick.color, brick.type === "hard" ? 16 : 11);
        audio.beep(brick.type === "hard" ? 95 : 520, 0.07, "square", brick.type === "hard" ? 0.09 : 0.07, brick.type === "hard" ? 0.55 : 1.6);
        if (brick.hits <= 0) {
          brick.alive = false;
          scene.remove(brick.mesh);
          if (brick.power) spawnPickup(brick.mesh.position, brick.power);
          audio.noise(0.08, 0.045);
        } else {
          brick.mesh.material.emissiveIntensity = 0.72;
          brick.mesh.material.color.offsetHSL(0, -0.12, -0.16);
        }
        updateHud();
      }

      function updatePickups(dt) {
        for (let i = pickups.length - 1; i >= 0; i -= 1) {
          const pickup = pickups[i];
          pickup.mesh.rotation.x += dt * 4;
          pickup.mesh.rotation.y += dt * 6;
          pickup.mesh.position.z += pickup.speed * dt;
          if (Math.abs(pickup.mesh.position.x - paddle.position.x) < currentPaddleWidth() / 2 + 0.34 && Math.abs(pickup.mesh.position.z - game.paddleZ) < 0.55) {
            applyPower(pickup.power);
            burst(pickup.mesh.position, palette[pickup.power] || palette.normal, 18);
            scene.remove(pickup.mesh);
            pickups.splice(i, 1);
          } else if (pickup.mesh.position.z > game.paddleZ + 2.5) {
            scene.remove(pickup.mesh);
            pickups.splice(i, 1);
          }
        }
      }

      function updateBursts(dt) {
        for (let i = bursts.length - 1; i >= 0; i -= 1) {
          const part = bursts[i];
          part.life -= dt;
          part.velocity.y -= dt * 5.2;
          part.mesh.position.addScaledVector(part.velocity, dt);
          part.mesh.material.opacity = Math.max(0, part.life * 1.8);
          if (part.life <= 0) {
            scene.remove(part.mesh);
            bursts.splice(i, 1);
          }
        }
      }

      function updateBricks(dt) {
        bricks.forEach((brick) => {
          if (!brick.alive) return;
          brick.mesh.scale.x += (1 - brick.mesh.scale.x) * Math.min(1, dt * 12);
          brick.mesh.scale.y += (1 - brick.mesh.scale.y) * Math.min(1, dt * 12);
          brick.mesh.scale.z += (1 - brick.mesh.scale.z) * Math.min(1, dt * 12);
          brick.mesh.material.emissiveIntensity += (0.16 - brick.mesh.material.emissiveIntensity) * Math.min(1, dt * 6);
        });
      }

      function updateRound() {
        for (let i = balls.length - 1; i >= 0; i -= 1) {
          if (balls[i].mesh.position.z > game.paddleZ + 2.1) {
            scene.remove(balls[i].mesh);
            balls.splice(i, 1);
            audio.beep(90, 0.16, "sawtooth", 0.08, 0.42);
          }
        }
        if (!balls.length) {
          game.lives -= 1;
          ballsEl.textContent = String(Math.max(0, game.lives));
          if (game.lives <= 0) {
            endGame("GAME OVER", "再投一枚硬币，砖墙不会自己消失。");
          } else {
            resetBall();
          }
        }
        if (bricks.every((brick) => !brick.alive)) {
          game.level += 1;
          game.score += 500;
          pickups.splice(0).forEach((pickup) => scene.remove(pickup.mesh));
          balls.splice(0).forEach((ball) => scene.remove(ball.mesh));
          layoutBricks();
          resetBall();
          pauseOverlay.classList.remove("show");
          game.paused = false;
          pauseButton.textContent = "暂停";
          audio.chord([392, 523, 784, 1046]);
          updateHud();
          message.querySelector("h1").textContent = `第 ${game.level} 关`;
          message.querySelector("p").textContent = `当前关卡模板：${getTemplate(game.level).name}。继续把球送回墙里。`;
          message.classList.add("hidden");
        }
      }

      function updateHud() {
        scoreEl.textContent = String(game.score).padStart(6, "0");
        ballsEl.textContent = String(Math.max(0, game.lives));
        levelEl.textContent = String(game.level);
      }

      function endGame(title, body) {
        game.running = false;
        message.querySelector("h1").textContent = title;
        message.querySelector("p").textContent = body;
        startButton.textContent = "再来一局";
        message.classList.remove("hidden");
        pauseOverlay.classList.remove("show");
        audio.chord([196, 146, 98]);
      }

      function newGame() {
        audio.start();
        game.running = true;
        game.paused = false;
        game.score = 0;
        game.lives = 3;
        game.level = 1;
        game.targetX = 0;
        game.magnetUntil = 0;
        game.wideUntil = 0;
        game.pierceUntil = 0;
        game.viewMode = Number(viewRange.value) / 100;
        paddle.position.x = 0;
        pickups.splice(0).forEach((pickup) => scene.remove(pickup.mesh));
        balls.splice(0).forEach((ball) => scene.remove(ball.mesh));
        bursts.splice(0).forEach((part) => scene.remove(part.mesh));
        layoutBricks(game.level);
        resetBall();
        updateHud();
        message.classList.add("hidden");
        pauseOverlay.classList.remove("show");
        pauseButton.textContent = "暂停";
      }

      function togglePause(force) {
        if (!game.running) return;
        game.paused = typeof force === "boolean" ? force : !game.paused;
        pauseOverlay.classList.toggle("show", game.paused);
        pauseButton.textContent = game.paused ? "继续" : "暂停";
        pauseOverlay.setAttribute("aria-hidden", String(!game.paused));
      }

      function resumeGame() {
        if (!game.running) return;
        if (!game.paused) return;
        togglePause(false);
      }

      function animate(now) {
        requestAnimationFrame(animate);
        const dt = Math.min(0.033, (now - game.lastTime) / 1000 || 0.016);
        game.lastTime = now;

        if (game.running && !game.paused) {
          updatePaddle(dt);
          balls.forEach((ball) => {
            ball.pierce = game.pierceUntil > now;
            if (!ball.pierce) {
              ball.mesh.material.emissive.setHex(0x342100);
              ball.mesh.material.emissiveIntensity = 0.35;
            }
            moveBall(ball, dt);
          });
          updatePickups(dt);
          updateBursts(dt);
          updateBricks(dt);
          updateRound();
        } else {
          updateBursts(dt);
        }

        amberLight.intensity = 2.1 + Math.sin(now * 0.006) * 0.35 + game.flash * 5;
        cyanLight.intensity = 1.35 + Math.sin(now * 0.004) * 0.25;
        game.flash = Math.max(0, game.flash - dt);
        game.shake = Math.max(0, game.shake - dt * 0.8);
        const sx = (Math.random() - 0.5) * game.shake;
        const sy = (Math.random() - 0.5) * game.shake * 0.6;
        updateCamera(sx, sy);
        renderer.render(scene, camera);
      }

      startButton.addEventListener("click", newGame);
      pauseButton.addEventListener("click", () => togglePause());
      viewRange.addEventListener("input", (event) => {
        game.viewMode = Number(event.target.value) / 100;
        updateCamera();
      });
      window.addEventListener("keydown", (event) => {
        game.keys.add(event.code);
        if (event.code === "Space") {
          event.preventDefault();
          if (!game.running) newGame();
          else if (game.paused) resumeGame();
          else if (balls.some((ball) => ball.stuck)) launchBalls();
          else togglePause();
        }
        if (event.code === "KeyP") {
          event.preventDefault();
          if (!game.running) newGame();
          else togglePause();
        }
      });
      window.addEventListener("keyup", (event) => game.keys.delete(event.code));
      window.addEventListener("pointermove", (event) => {
        const ratio = event.clientX / window.innerWidth;
        game.targetX = THREE.MathUtils.lerp(-game.width / 2, game.width / 2, ratio);
      });
      window.addEventListener("pointerdown", () => {
        if (!game.running) return;
        if (game.paused) {
          resumeGame();
          return;
        }
        if (balls.some((ball) => ball.stuck)) launchBalls();
      });
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      layoutBricks(game.level);
      resetBall();
      updateHud();
      updateCamera();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
